name: Scraping ANFP diario

on:
  schedule:
    # GitHub Actions usa hora UTC. Chile es UTC-4 (invierno) / UTC-3 (verano).
    # 08:00 UTC = 04:00 en invierno chileno y 05:00 en verano. Para un job
    # nocturno esto es perfecto. Si quieres exactamente las 4am todo el año,
    # ver la nota en el README.
    - cron: '0 8 * * *'
  workflow_dispatch: {}   # permite ejecutarlo a mano desde la pestaña "Actions"

permissions:
  contents: write          # necesario para que el bot pueda guardar la BBDD

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar scraper
        run: python -m scraper.main

      - name: Guardar datos en el repositorio
        run: |
          git config user.name "anfp-bot"
          git config user.email "actions@github.com"
          git add data/ anfp.db
          git diff --staged --quiet || git commit -m "Scrape ANFP $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
