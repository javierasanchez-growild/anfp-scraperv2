name: Historico API-Football

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 6 1 * *'

permissions:
  contents: write

jobs:
  historico:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Bajar historico API-Football
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python -m scraper.historico_apifootball

      - name: Guardar datos en el repositorio
        run: |
          git config user.name "anfp-bot"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Historico API-Football $(date -u +'%Y-%m-%d')"
          git push
